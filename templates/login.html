<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Arcana Access Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-xl font-bold text-center mb-6">Arcana Access Control</h1>
    {% if error %}
    <div class="bg-red-50 text-red-700 px-4 py-2 rounded mb-4 text-sm">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/admin/login">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required
               class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit"
              class="w-full bg-gray-900 text-white py-2 rounded text-sm font-medium hover:bg-gray-800">
        Sign In
      </button>
    </form>
  </div>
</body>
</html>
