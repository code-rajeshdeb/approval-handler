# =============================================================================
# ExternalSecret: Admin UI Authentication Credentials
# =============================================================================
# Pulls admin credentials from OpenBao for the approval handler admin UI.
# These credentials protect the admin endpoints (rule management, group
# management, manual request operations).
#
# OpenBao KV v2 path: secret/platform-services/argo-workflows/approval-handler-admin
#   Keys: username, password
#
# This secret is used by:
#   - Approval handler deployment (admin API authentication)
#
# Setup (one-time):
#   vault kv put secret/platform-services/argo-workflows/approval-handler-admin \
#     username="admin" password="<secure-password>" secret-key="<random-32-char-string>"
#
# To rotate:
#   vault kv put secret/platform-services/argo-workflows/approval-handler-admin \
#     username="admin" password="<new-password>" secret-key="<new-random-string>"
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: approval-handler-admin-auth
  namespace: argo-access-control
  labels:
    app: access-control
    component: admin-auth
    app.kubernetes.io/part-of: argo-access-control
    app.kubernetes.io/managed-by: external-secrets
    secret-backend: openbao
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: openbao-secret-store
    kind: ClusterSecretStore
  target:
    name: approval-handler-admin-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: platform-services/argo-workflows/approval-handler-admin
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
