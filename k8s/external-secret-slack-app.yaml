# =============================================================================
# ExternalSecret: Slack App Bot Token and Signing Secret
# =============================================================================
# Pulls Slack App credentials from OpenBao for the approval handler's
# Slack integration (interactive approval buttons, notifications).
#
# OpenBao KV v2 path: secret/platform-services/argo-workflows/slack-app
#   Keys: bot-token, signing-secret
#
# This secret is used by:
#   - Approval handler deployment (Slack API integration)
#
# Slack App Setup:
#   1. Create a Slack App at https://api.slack.com/apps
#   2. Enable "Interactivity & Shortcuts" with request URL pointing to
#      the approval handler's /slack/interact endpoint
#   3. Add Bot Token Scopes: chat:write, reactions:write, users:read,
#      users:read.email, channels:read
#   4. Install the app to the workspace
#   5. Copy the Bot User OAuth Token (xoxb-...) and Signing Secret
#
# Setup (one-time):
#   vault kv put secret/platform-services/argo-workflows/slack-app \
#     bot-token="xoxb-..." signing-secret="<signing-secret>"
#
# To rotate:
#   vault kv put secret/platform-services/argo-workflows/slack-app \
#     bot-token="xoxb-..." signing-secret="<new-signing-secret>"
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: approval-handler-slack-app
  namespace: argo-access-control
  labels:
    app: access-control
    component: slack-integration
    app.kubernetes.io/part-of: argo-access-control
    app.kubernetes.io/managed-by: external-secrets
    secret-backend: openbao
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: openbao-secret-store
    kind: ClusterSecretStore
  target:
    name: approval-handler-slack-app
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: platform-services/argo-workflows/slack-app
