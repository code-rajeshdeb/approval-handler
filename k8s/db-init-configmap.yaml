# =============================================================================
# ConfigMap: Database Schema and Seed Data for Access Control DB
# =============================================================================
# Contains the full SQL schema (6 tables + indexes) and seed data for the
# Argo Access Control approval system.
#
# This ConfigMap is consumed by db-init-job.yaml which runs psql against
# the CNPG cluster to initialize the database.
#
# All statements use IF NOT EXISTS / ON CONFLICT DO NOTHING patterns
# so the job is fully idempotent and safe to re-run.
#
# Tables:
#   1. approval_rules        - Rule engine for matching requests to approval policies
#   2. approver_groups        - Named groups of approvers
#   3. approver_group_members - Members within each approver group
#   4. access_requests        - Full lifecycle audit log of all access requests
#   5. teams                  - Team definitions with lead group mapping (v1.8.0)
#   6. slack_users            - Cached Slack user directory for dropdowns (v1.8.0)
#
# Schema reference: plans/argo-approval-workflow-plan.md §9
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-schema
  namespace: argo-access-control
  labels:
    app: access-control
    component: database
    app.kubernetes.io/part-of: argo-access-control
data:
  init.sql: |
    -- =======================================================================
    -- Access Control Database Schema + Seed Data
    -- =======================================================================
    -- Idempotent: safe to run multiple times (IF NOT EXISTS / ON CONFLICT)
    -- =======================================================================

    BEGIN;

    -- ═══════════════════════════════════════════════════════════════
    -- 1. APPROVAL RULES (Rule Engine)
    -- ═══════════════════════════════════════════════════════════════
    -- Rules are evaluated in priority order (lowest number first).
    -- NULL match conditions act as wildcards (match any value).
    -- First matching rule wins.
    -- ═══════════════════════════════════════════════════════════════
    CREATE TABLE IF NOT EXISTS approval_rules (
        id                  SERIAL PRIMARY KEY,
        name                VARCHAR(128) NOT NULL UNIQUE,
        priority            INTEGER NOT NULL DEFAULT 100,
        enabled             BOOLEAN NOT NULL DEFAULT TRUE,

        -- Match conditions (NULL = match any)
        requester_email     VARCHAR(256),
        resource_type       VARCHAR(128),
        permission_level    VARCHAR(64),
        gcp_project         VARCHAR(128),
        action              VARCHAR(16),
        access_type         VARCHAR(16),

        -- Approval action
        approvers_required  INTEGER NOT NULL DEFAULT 1,
        approval_levels     INTEGER NOT NULL DEFAULT 1,
        lead_group          VARCHAR(32),          -- First approval group
        second_approval_group VARCHAR(32),        -- Second approval group (2-level)

        -- Validation
        require_reason      BOOLEAN NOT NULL DEFAULT TRUE,
        require_ticket      BOOLEAN NOT NULL DEFAULT FALSE,
        ticket_pattern      VARCHAR(128) DEFAULT 'ARC-',

        -- Metadata
        description         TEXT,
        created_by          VARCHAR(128),
        created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_rules_priority ON approval_rules(priority);

    -- ═══════════════════════════════════════════════════════════════
    -- 2. APPROVER GROUPS
    -- ═══════════════════════════════════════════════════════════════
    CREATE TABLE IF NOT EXISTS approver_groups (
        id          SERIAL PRIMARY KEY,
        group_name  VARCHAR(64) NOT NULL UNIQUE,
        description VARCHAR(256),
        created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS approver_group_members (
        id              SERIAL PRIMARY KEY,
        group_id        INTEGER NOT NULL REFERENCES approver_groups(id) ON DELETE CASCADE,
        email           VARCHAR(128) NOT NULL,
        slack_user_id   VARCHAR(32),
        display_name    VARCHAR(128),
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE(group_id, email)
    );

    CREATE INDEX IF NOT EXISTS idx_agm_group ON approver_group_members(group_id);

    -- ═══════════════════════════════════════════════════════════════
    -- 3. ACCESS REQUESTS (Audit Log)
    -- ═══════════════════════════════════════════════════════════════
    -- Full lifecycle tracking: pending → approved/rejected → executed
    -- Every access request is recorded here for audit purposes.
    -- ═══════════════════════════════════════════════════════════════
    CREATE TABLE IF NOT EXISTS access_requests (
        id                      SERIAL PRIMARY KEY,
        request_id              VARCHAR(64) UNIQUE NOT NULL,
        request_type            VARCHAR(32) NOT NULL,

        -- Who requested
        requester_email         VARCHAR(128) NOT NULL,

        -- What was requested
        action                  VARCHAR(16) NOT NULL,
        who_type                VARCHAR(32),
        who_email               VARCHAR(128),
        resource_type           VARCHAR(64),
        resource_name           VARCHAR(256),
        permission_level        VARCHAR(32),
        custom_role             VARCHAR(256),
        gcp_project             VARCHAR(64),
        access_type             VARCHAR(16),
        expiry_hours            INTEGER,
        reason                  TEXT,
        ticket                  VARCHAR(256),

        -- Rule that matched
        matched_rule_id         INTEGER REFERENCES approval_rules(id),
        matched_rule_name       VARCHAR(128),
        risk_level              VARCHAR(16) NOT NULL DEFAULT 'medium',

        -- Level 1 Approval (Team Lead)
        lead_approval_required  BOOLEAN DEFAULT FALSE,
        lead_approver_group     VARCHAR(32),
        lead_approved_by        VARCHAR(128),
        lead_approved_at        TIMESTAMPTZ,

        -- Level 2 / Final Approval
        final_approval_required BOOLEAN DEFAULT TRUE,
        final_approved_by       VARCHAR(128),
        final_approved_at       TIMESTAMPTZ,

        -- Status
        status                  VARCHAR(16) NOT NULL DEFAULT 'pending',
        rejection_reason        TEXT,

        -- Execution
        executed_at             TIMESTAMPTZ,
        iam_role                VARCHAR(128),
        error_message           TEXT,
        auto_revoke_at          TIMESTAMPTZ,

        -- Slack
        slack_channel           VARCHAR(64),
        slack_ts                VARCHAR(64),

        -- Google Sheet
        sheet_row               INTEGER,

        -- Timestamps
        created_at              TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at              TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_req_status ON access_requests(status);
    CREATE INDEX IF NOT EXISTS idx_req_requester ON access_requests(requester_email);
    CREATE INDEX IF NOT EXISTS idx_req_date ON access_requests(created_at);
    CREATE INDEX IF NOT EXISTS idx_req_project ON access_requests(gcp_project);

    -- Add workflow_name column if it doesn't exist (idempotent via DO block)
    DO $$
    BEGIN
        IF NOT EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'access_requests' AND column_name = 'workflow_name'
        ) THEN
            ALTER TABLE access_requests ADD COLUMN workflow_name VARCHAR(256);
        END IF;
    END $$;

    -- Add second_approval_group column if it doesn't exist (v1.6.0)
    DO $$
    BEGIN
        IF NOT EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'approval_rules' AND column_name = 'second_approval_group'
        ) THEN
            ALTER TABLE approval_rules ADD COLUMN second_approval_group VARCHAR(32);
        END IF;
    END $$;


    -- ═══════════════════════════════════════════════════════════════
    -- 5. TEAMS (v1.8.0)
    -- ═══════════════════════════════════════════════════════════════
    -- Maps team names to their lead approval group.
    -- Used by the Slack modal "Your Team" field for team-based routing.
    -- ═══════════════════════════════════════════════════════════════
    CREATE TABLE IF NOT EXISTS teams (
        id          SERIAL PRIMARY KEY,
        team_name   VARCHAR(64) NOT NULL UNIQUE,
        lead_group  VARCHAR(64) REFERENCES approver_groups(group_name),
        description VARCHAR(256),
        created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ═══════════════════════════════════════════════════════════════
    -- 6. SLACK USERS CACHE (v1.8.0)
    -- ═══════════════════════════════════════════════════════════════
    -- Periodically synced from Slack API (every 4 hours).
    -- Used for searchable user dropdowns in admin UI.
    -- ═══════════════════════════════════════════════════════════════
    CREATE TABLE IF NOT EXISTS slack_users (
        id              SERIAL PRIMARY KEY,
        slack_user_id   VARCHAR(32) NOT NULL UNIQUE,
        email           VARCHAR(128) NOT NULL,
        display_name    VARCHAR(128),
        real_name       VARCHAR(128),
        avatar_url      VARCHAR(512),
        is_active       BOOLEAN NOT NULL DEFAULT TRUE,
        synced_at       TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_slack_users_email ON slack_users(email);

    -- Add team column to access_requests (v1.8.0)
    DO $$
    BEGIN
        IF NOT EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'access_requests' AND column_name = 'team'
        ) THEN
            ALTER TABLE access_requests ADD COLUMN team VARCHAR(64);
        END IF;
    END $$;

    -- Add who_type column to approval_rules (v1.8.2)
    DO $$
    BEGIN
        IF NOT EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'approval_rules' AND column_name = 'who_type'
        ) THEN
            ALTER TABLE approval_rules ADD COLUMN who_type VARCHAR(64);
        END IF;
    END $$;

    -- Add vault columns to access_requests (v1.9.0)
    DO $$
    BEGIN
        IF NOT EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'access_requests' AND column_name = 'vault_operation'
        ) THEN
            ALTER TABLE access_requests ADD COLUMN vault_operation VARCHAR(64);
        END IF;
        IF NOT EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'access_requests' AND column_name = 'vault_path'
        ) THEN
            ALTER TABLE access_requests ADD COLUMN vault_path VARCHAR(512);
        END IF;
        IF NOT EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'access_requests' AND column_name = 'vault_key'
        ) THEN
            ALTER TABLE access_requests ADD COLUMN vault_key VARCHAR(256);
        END IF;
        IF NOT EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'access_requests' AND column_name = 'vault_value'
        ) THEN
            ALTER TABLE access_requests ADD COLUMN vault_value TEXT;
        END IF;
    END $$;

    -- ═══════════════════════════════════════════════════════════════
    -- 7. SERVICE CATEGORIES (v2.1.0)
    -- ═══════════════════════════════════════════════════════════════
    -- Admin-managed service categories for the Slack IAM Role picker.
    -- Each category groups related GCP IAM roles.
    -- ═══════════════════════════════════════════════════════════════
    CREATE TABLE IF NOT EXISTS service_categories (
        id                  SERIAL PRIMARY KEY,
        category_key        VARCHAR(64) NOT NULL UNIQUE,
        label               VARCHAR(128) NOT NULL,
        resource_level      BOOLEAN NOT NULL DEFAULT FALSE,
        resource_placeholder VARCHAR(256),
        enabled             BOOLEAN NOT NULL DEFAULT TRUE,
        sort_order          INTEGER NOT NULL DEFAULT 100,
        created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ═══════════════════════════════════════════════════════════════
    -- 8. IAM ROLES (v2.1.0)
    -- ═══════════════════════════════════════════════════════════════
    -- Individual IAM roles within each service category.
    -- Admin can enable/disable roles; only enabled ones appear in Slack form.
    -- ═══════════════════════════════════════════════════════════════
    CREATE TABLE IF NOT EXISTS iam_roles (
        id              SERIAL PRIMARY KEY,
        category_key    VARCHAR(64) NOT NULL REFERENCES service_categories(category_key) ON DELETE CASCADE,
        display_name    VARCHAR(128) NOT NULL,
        role_value      VARCHAR(256) NOT NULL,
        description     TEXT,
        enabled         BOOLEAN NOT NULL DEFAULT TRUE,
        sort_order      INTEGER NOT NULL DEFAULT 100,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE(category_key, role_value)
    );

    CREATE INDEX IF NOT EXISTS idx_iam_roles_category ON iam_roles(category_key);

    -- ═══════════════════════════════════════════════════════════════
    -- SEED DATA: Default Approval Rules
    -- ═══════════════════════════════════════════════════════════════
    -- Rules evaluated in priority order (lowest first). First match wins.
    --
    --   10  devops-team-auto-approve   → Auto-approve for DevOps lead
    --   20  stage-viewer-auto-approve  → Stage viewer auto-approved with alert
    --   30  stage-editor-admin         → Stage editor/admin needs 1-level approval
    --   40  prod-viewer               → Prod viewer needs approval + ticket
    --   50  prod-editor-admin         → Prod editor/admin needs 2-level approval
    --   60  revoke-auto-approve       → Revoke actions auto-approved
    --  999  default-require-approval  → Catch-all: require single approval + ticket
    -- ═══════════════════════════════════════════════════════════════
    INSERT INTO approval_rules (name, priority, requester_email, resource_type, permission_level, gcp_project, action, access_type, approvers_required, approval_levels, lead_group, require_reason, require_ticket, ticket_pattern, description) VALUES
    ('stage-viewer-auto-approve', 20, NULL, NULL, 'viewer', 'your-gcp-project-stage', 'grant', NULL, 0, 0, NULL, true, false, NULL, 'Stage viewer access auto-approved with alert'),
    ('stage-editor-admin', 30, NULL, NULL, 'editor,admin,custom,none', 'your-gcp-project-stage', NULL, NULL, 1, 1, NULL, true, false, NULL, 'Stage editor/admin/custom needs single-level approval'),
    ('prod-viewer', 40, NULL, NULL, 'viewer', 'your-gcp-project-prod,your-gcp-project-data', NULL, NULL, 1, 1, NULL, true, true, 'ENG-', 'Prod viewer needs approval + ticket'),
    ('prod-editor-admin', 50, NULL, NULL, 'editor,admin,custom,none', 'your-gcp-project-prod,your-gcp-project-data', NULL, NULL, 1, 2, 'engineering-leads', true, true, 'ENG-', 'Prod editor/admin/custom needs two-level approval + ticket'),
    ('revoke-auto-approve', 60, NULL, NULL, NULL, NULL, 'revoke', NULL, 0, 0, NULL, true, false, NULL, 'Revoke actions auto-approved'),
    ('default-require-approval', 999, NULL, NULL, NULL, NULL, NULL, NULL, 1, 1, NULL, true, true, 'ENG-', 'Default catch-all: require single approval + ticket')
    ON CONFLICT (name) DO NOTHING;


    -- ═══════════════════════════════════════════════════════════════
    -- SEED DATA: Default Approver Groups
    -- ═══════════════════════════════════════════════════════════════
    INSERT INTO approver_groups (group_name, description) VALUES
    ('final-approvers', 'Final approval authority - DevOps and management'),
    ('engineering-leads', 'Engineering team leads'),
    ('devops-leads', 'DevOps team leads'),
    ('data-leads', 'Data team leads')
    ON CONFLICT (group_name) DO NOTHING;


    -- ═══════════════════════════════════════════════════════════════
    -- SEED DATA: Default Approver Group Members
    -- ═══════════════════════════════════════════════════════════════
    INSERT INTO approver_group_members (group_id, email, display_name) VALUES
    -- Example approvers - replace with your team:
    -- ((SELECT id FROM approver_groups WHERE group_name='final-approvers'), 'admin@example.com', 'Admin User'),
    -- ((SELECT id FROM approver_groups WHERE group_name='devops-leads'), 'devops-lead@example.com', 'DevOps Lead')
    ON CONFLICT (group_id, email) DO NOTHING;


    -- ═══════════════════════════════════════════════════════════════
    -- SEED DATA: Default Teams (v1.8.0)
    -- ═══════════════════════════════════════════════════════════════
    INSERT INTO teams (team_name, lead_group, description) VALUES
    ('Backend', NULL, 'Backend Engineering team'),
    ('Compute Platform', NULL, 'Compute Platform team'),
    ('DA', NULL, 'Data Analytics team'),
    ('Data Science', NULL, 'Data Science team'),
    ('DE', NULL, 'Data Engineering team'),
    ('DevOps', 'devops-leads', 'DevOps / Infrastructure team'),
    ('FE', NULL, 'Frontend Engineering team'),
    ('Financial Analyst', NULL, 'Financial Analyst team'),
    ('iOS', NULL, 'iOS Engineering team'),
    ('PDA', NULL, 'Product & Data Analytics team'),
    ('QA', NULL, 'Quality Assurance team')
    ON CONFLICT (team_name) DO NOTHING;

    -- ═══════════════════════════════════════════════════════════════
    -- SEED DATA: Service Categories (v2.1.0)
    -- ═══════════════════════════════════════════════════════════════
    INSERT INTO service_categories (category_key, label, resource_level, resource_placeholder, enabled, sort_order) VALUES
