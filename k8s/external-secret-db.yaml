# =============================================================================
# ExternalSecret: PostgreSQL Credentials for CNPG Bootstrap
# =============================================================================
# Pulls DB credentials from OpenBao and creates K8s Secret
# 'access-control-db-credentials' in argo-access-control namespace.
#
# OpenBao KV v2 path: secret/platform-services/argo-workflows/access-control-db-credentials
#   Keys: username, password
#
# This secret is used by:
#   - CNPG bootstrap (pg-cluster.yaml initdb.secret)
#   - DB init job (db-init-job.yaml)
#   - Approval handler workflow templates
#
# Setup (one-time):
#   vault kv put secret/platform-services/argo-workflows/access-control-db-credentials \
#     username="access_control" password="<secure-password>"
#
# To rotate:
#   vault kv put secret/platform-services/argo-workflows/access-control-db-credentials \
#     username="access_control" password="<new-password>"
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: access-control-db-credentials
  namespace: argo-access-control
  labels:
    app: access-control
    component: database
    app.kubernetes.io/part-of: argo-access-control
    app.kubernetes.io/managed-by: external-secrets
    secret-backend: openbao
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: openbao-secret-store
    kind: ClusterSecretStore
  target:
    name: access-control-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          app: access-control
          component: database
          cnpg.io/cluster: access-control-db
  dataFrom:
    - extract:
        key: platform-services/argo-workflows/access-control-db-credentials
